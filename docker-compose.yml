services:
  cloud-migration-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloud-migration-mcp:latest
    container_name: cloud-migration-mcp
    ports:
      - "3456:3456"
    environment:
      PORT: "3456"
      # Override data file paths to volume-mounted locations
      GUARDRAILS_FILE: /data/guardrails/migration-guardrails.md
      CRITERIA_FILE: /data/criteria/migration-criteria.json
      RED_FLAGS_FILE: /data/red-flags/migration-red-flags.json
    volumes:
      # Mount local data directories so edits take effect without rebuilding
      - ./guardrails:/data/guardrails:ro
      - ./criteria:/data/criteria:ro
      - ./red-flags:/data/red-flags:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e",
        "fetch('http://localhost:3456/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
